server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:mariadb://${DB_HOST:mariadb}:${DB_PORT:3306}/${DB_NAME:as_immobilien}
    username: ${DB_USER:as_user}
    password: ${DB_PASSWORD:as_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: ${SMTP_STARTTLS:true}
      mail.smtp.ssl.enable: ${SMTP_SECURE:false}

app:
  jwt-secret: ${JWT_SECRET:bitte-einen-langen-geheimen-schluessel-setzen}
  jwt-expiration-hours: ${JWT_EXPIRATION_HOURS:72}
  upload-dir: ${UPLOAD_DIR:/app/uploads}
  public-upload-prefix: ${PUBLIC_UPLOAD_PREFIX:/uploads}
  public-base-url: ${PUBLIC_BASE_URL:http://localhost}
  mail-asset-base-url: ${MAIL_ASSET_BASE_URL:}
  mail-from: ${MAIL_FROM:mailer@example.com}
  mail-from-name: ${MAIL_FROM_NAME:AS Immobilienverwaltung & Dienstleistungen}
  contact-receiver-email: ${CONTACT_RECEIVER_EMAIL:info@example.com}
  immv-receiver-email: ${IMMV_RECEIVER_EMAIL:${CONTACT_RECEIVER_EMAIL:info@example.com}}
  dienstl-receiver-email: ${DIENSTL_RECEIVER_EMAIL:${CONTACT_RECEIVER_EMAIL:info@example.com}}
